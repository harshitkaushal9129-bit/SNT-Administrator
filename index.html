<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNT Admin Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .hub-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00d2ff, #91eae4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: #94a3b8; margin-bottom: 40px; }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 25px;
        }

        .hub-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .hub-card i {
            font-size: 3rem;
            color: var(--primary);
            transition: 0.3s;
        }

        .hub-card span {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .hub-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .hub-card:hover i {
            transform: scale(1.1);
            text-shadow: 0 0 15px var(--primary);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>SNT Administrator Hub</h1>
        <p>Official Control Portal for Institute Management</p>

        <div class="icon-grid">
            <a href="Admin.html" class="hub-card">
                <i class="fas fa-users-cog"></i>
                <span>Student Admin</span>
            </a>

            <a href="Admin-timer.html" class="hub-card">
                <i class="fas fa-stopwatch"></i>
                <span>Exam Timer</span>
            </a>

            <a href="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/Pdf-edit.html" class="hub-card">
                <i class="fas fa-file-pdf"></i>
                <span>PDF Editor</span>
            </a>

            <a href="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/" class="hub-card">
                <i class="fas fa-chart-line"></i>
                <span>Main Dashboard</span>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 SNT Computer Institute | Admin Access Only
        </div>
    </div>

</body>
</html>
