<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNT Admin Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .hub-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 900px;
        }

        h1 { font-size: 2.2rem; margin-bottom: 30px; color: #00d2ff; }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .hub-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hub-card:hover {
            background: rgba(0, 210, 255, 0.1);
            transform: translateY(-8px);
            border-color: #00d2ff;
        }

        .hub-card i { font-size: 2.5rem; color: #00d2ff; }

        .hub-card span { font-weight: 500; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>SNT Administration Hub</h1>
        
        <div class="icon-grid">
            <a href="admin.html" class="hub-card">
                <i class="fas fa-user-shield"></i>
                <span>Student Admin</span>
            </a>

            <a href="https://harshitkaushal9129-bit.github.io/snt-institute/admin_timer.html" class="hub-card">
                <i class="fas fa-clock"></i>
                <span>Exam Timer</span>
            </a>

            <a href="https://harshitkaushal9129-bit.github.io/snt-institute/admit_card.html" class="hub-card">
                <i class="fas fa-id-card"></i>
                <span>Admit Cards</span>
            </a>

            <a href="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/Pdf-edit.html" class="hub-card">
                <i class="fas fa-file-pdf"></i>
                <span>PDF Editor</span>
            </a>
        </div>
    </div>

</body>
</html>
